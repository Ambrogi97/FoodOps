services:
  minio:
    image: minio/minio:latest
    container_name: foodops-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: foodops
      MINIO_ROOT_PASSWORD: foodops123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  minio-data:
